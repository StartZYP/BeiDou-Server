name: Build & Release

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: mvn clean package -DskipTests -q

      - name: Verify JAR
        run: |
          JAR="gms-server/target/BeiDou.jar"
          if [ ! -f "$JAR" ]; then
            echo "❌ JAR not found: $JAR"
            exit 1
          fi
          SIZE=$(du -sh "$JAR" | cut -f1)
          echo "✅ Build success: $JAR ($SIZE)"

      # PR 时只编译验证，不发 Release
      - name: Upload artifact (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: BeiDou-jar
          path: gms-server/target/BeiDou.jar
          retention-days: 7

      # Master push 时自动发 Release
      - name: Generate version
        if: github.event_name == 'push'
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date +'%Y%m%d')
          VERSION="v1.0.${DATE}-${SHORT_SHA}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: Get changelog
        if: github.event_name == 'push'
        id: changelog
        run: |
          # 获取最近的 tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            LOG=$(git log --oneline -20 --no-merges)
          else
            LOG=$(git log ${LAST_TAG}..HEAD --oneline --no-merges)
          fi
          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: |
            ## 🚀 自动构建 - ${{ steps.version.outputs.version }}

            **构建信息：**
            - ☕ Java: JDK 21
            - 🔧 Maven: 3.8.7
            - 📅 构建时间: ${{ github.event.repository.updated_at }}
            - 🔗 Commit: ${{ github.sha }}

            **更新内容：**
            ```
            ${{ steps.changelog.outputs.log }}
            ```

            **下载：**
            - `BeiDou.jar` — Spring Boot 可执行 JAR

            ---
            *此 Release 由 GitHub Actions 自动构建发布*
          files: gms-server/target/BeiDou.jar
          draft: false
          prerelease: false
